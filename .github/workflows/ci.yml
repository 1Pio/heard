name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Swift build and tests
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6
      - name: Resolve dependencies
        run: swift package resolve
      - name: Build release executable
        run: swift build --configuration release
      - name: Run tests
        run: swift test
